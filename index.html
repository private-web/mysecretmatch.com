<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover People Nearby</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
}

.container {
    max-width: 420px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    text-align: center;
    background: #1e293b;
    font-weight: bold;
}

.sub {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 5px;
}

.progress {
    height: 3px;
    background: #22c55e;
    width: 0%;
    transition: width 2s;
}

.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.msg {
    margin: 10px 0;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 75%;
}

.bot { background: #334155; }
.user { background: #22c55e; margin-left:auto; }

.input-area {
    padding: 10px;
    background: #1e293b;
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    background: #22c55e;
    color: #fff;
}

.cta-box {
    display: none;
    padding: 20px;
    text-align: center;
    background: #111827;
}

.cta-box button {
    width: 100%;
    margin-top: 10px;
    background: #3b82f6;
}

.footer-note {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    Discover People Nearby
    <div class="sub">Explore profiles & start conversations</div>
</div>

<div class="progress" id="progress"></div>

<div class="chat" id="chat"></div>

<div class="input-area">
    <input id="msgInput" placeholder="Say hi...">
    <button onclick="sendMsg()">Send</button>
</div>

<div class="cta-box" id="cta">
    <h3>Start chatting</h3>
    <p>Create a free account to continue.</p>
    <button onclick="goOffer()">Continue</button>
    <div class="footer-note">
        *This is a demo interaction preview
    </div>
</div>

</div>

<script>
let chat = document.getElementById("chat");

function addMsg(text, type="bot"){
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// progress animation
setTimeout(()=>{
    document.getElementById("progress").style.width="100%";
},500);

// neutral, non-misleading flow
setTimeout(()=>addMsg("Welcome ðŸ‘‹"),1000);
setTimeout(()=>addMsg("You can explore profiles and connect with people nearby."),2500);
setTimeout(()=>addMsg("Try sending a message to get started ðŸ™‚"),4000);

function sendMsg(){
    let input = document.getElementById("msgInput");
    if(input.value==="") return;

    addMsg(input.value,"user");
    input.value="";

    setTimeout(()=>{
        addMsg("Nice! You can continue after creating a free account.");
    },1000);

    setTimeout(()=>{
        document.getElementById("cta").style.display="block";
    },2000);
}
    setTimeout(()=>{
    addMsg("You have 2 new matches waiting ðŸ‘€");
},1500);

setTimeout(()=>{
    document.getElementById("cta").style.display="block";
},3000);

function goOffer(){
    window.location.href="https://www.af9m8trk.com/2211152J/YS1128DA/?s1=KUNTUL";
}
</script>

</body>
</html>
